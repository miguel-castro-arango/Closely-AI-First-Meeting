<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--bg);color:var(--fg);font-family:var(--font-mono);padding:24px 26px;}
  .row{display:flex;align-items:center;justify-content:space-between;gap:24px;}
  .row img{height:42px;width:auto;object-fit:contain;opacity:.85;filter:grayscale(1) brightness(1.4);}
  .tag{font-size:10px;color:var(--muted);margin-top:20px;text-transform:uppercase;letter-spacing:.12em;}
</style>
</head>
<body>
  <div class="row">
    <img src="../assets/clients/national-security.png" alt="National Security">
    <img src="../assets/clients/instaseg.png" alt="Instaseg">
    <img src="../assets/clients/seguridad-g2.png" alt="Seguridad G2">
    <img src="../assets/clients/security-shops.png" alt="Security Shops">
    <img src="../assets/clients/pintalba.png" alt="Pintalba">
  </div>
  <div class="tag">Partner / client logos · shown grayscale at reduced opacity in a marquee strip</div>
</body>
</html>
