<!-- @dsCard group="Colors" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--bg);color:var(--fg);font-family:var(--font-mono);padding:22px 26px;}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
  .sw{border-radius:10px;height:50px;border:1px solid var(--border);}
  .name{font-size:10.5px;color:var(--fg-strong);margin-top:7px;}
  .hex{font-size:9.5px;color:var(--muted);}
  .pill{display:inline-flex;align-items:center;gap:6px;border-radius:9999px;padding:3px 9px;font-size:10px;text-transform:uppercase;letter-spacing:.08em;margin-top:8px;}
  .dot{width:6px;height:6px;border-radius:50%;}
</style>
</head>
<body>
  <div class="grid">
    <div>
      <div class="sw" style="background:#10B981;"></div><div class="name">success #10B981</div><div class="hex">validated · live</div>
      <span class="pill" style="background:var(--success-soft);border:1px solid var(--success-line);color:var(--success);"><span class="dot" style="background:var(--success);"></span>ACTIVE</span>
    </div>
    <div>
      <div class="sw" style="background:#EF4444;"></div><div class="name">danger #EF4444</div><div class="hex">intrusion · critical</div>
      <span class="pill" style="background:var(--danger-soft);border:1px solid var(--danger-line);color:var(--danger);">INTRUSION</span>
    </div>
    <div>
      <div class="sw" style="background:#F59E0B;"></div><div class="name">warn #F59E0B</div><div class="hex">loitering · soon</div>
      <span class="pill" style="background:var(--warn-soft);border:1px solid var(--warn-line);color:var(--warn);">COMING SOON</span>
    </div>
  </div>
</body>
</html>
