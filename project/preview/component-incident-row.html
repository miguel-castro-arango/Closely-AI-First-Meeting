<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--bg);color:var(--fg);font-family:var(--font-sans);padding:22px 26px;}
  .list{display:flex;flex-direction:column;gap:8px;}
  .row{display:flex;align-items:center;justify-content:space-between;gap:12px;border:1px solid var(--border);background:rgba(17,19,32,0.4);border-radius:8px;padding:10px;}
  .left{display:flex;align-items:center;gap:10px;min-width:0;}
  .ttag{font-family:var(--font-mono);border-radius:4px;border:1px solid;padding:2px 6px;font-size:9.5px;text-transform:uppercase;letter-spacing:.08em;white-space:nowrap;}
  .danger{color:var(--danger);border-color:var(--danger-line);background:var(--danger-soft);}
  .warn{color:var(--warn);border-color:var(--warn-line);background:var(--warn-soft);}
  .time{font-family:var(--font-mono);font-size:11px;color:var(--muted);}
  .loc{font-size:11.5px;color:var(--fg-strong);}
  .conf{font-family:var(--font-mono);font-size:10px;color:var(--muted);}
</style>
</head>
<body>
  <div class="list">
    <div class="row"><div class="left"><span class="ttag danger">Stolen bike</span><div><div class="time">14:32:14</div><div class="loc">CAM-02 · Back Door</div></div></div><span class="conf">94%</span></div>
    <div class="row"><div class="left"><span class="ttag warn">Open door</span><div><div class="time">14:18:21</div><div class="loc">CAM-04 · Loading Bay</div></div></div><span class="conf">81%</span></div>
    <div class="row"><div class="left"><span class="ttag warn">Tailgating</span><div><div class="time">12:41:03</div><div class="loc">CAM-01 · Main Lobby</div></div></div><span class="conf">88%</span></div>
  </div>
</body>
</html>
