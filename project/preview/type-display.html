<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--bg);color:var(--fg);font-family:var(--font-sans);padding:26px 30px;}
  .row{display:flex;align-items:baseline;gap:14px;}
  .tag{font-family:var(--font-mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);}
</style>
</head>
<body>
  <div style="display:flex;flex-direction:column;gap:14px;">
    <div class="cl-h1" style="font-size:46px;">DETECT EVERYTHING</div>
    <div class="row">
      <span class="cl-h2" style="font-size:28px;">PHYSICAL SECURITY</span>
      <span class="tag">Tomorrow · Display · 600 · uppercase</span>
    </div>
    <div class="tag" style="margin-top:2px;">H1 72px / H2 44px · letter-spacing −0.02em · line-height 1.05 · used for hero + section titles &amp; the wordmark</div>
  </div>
</body>
</html>
