<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--bg);color:var(--fg);font-family:var(--font-sans);padding:24px 28px;}
  .row{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;}
  .stat{font-family:var(--font-display);font-weight:600;font-size:54px;line-height:1;letter-spacing:-0.02em;}
  .label{font-size:12px;color:var(--muted-strong);margin-top:8px;line-height:1.35;}
</style>
</head>
<body>
  <div class="row">
    <div><div class="stat cl-text-gradient">+32%</div><div class="label">more commercial proposals sold per month</div></div>
    <div><div class="stat cl-text-gradient">−90%</div><div class="label">lower monitoring personnel costs</div></div>
    <div><div class="stat cl-text-gradient">12×</div><div class="label">more security alerts detected</div></div>
  </div>
</body>
</html>
