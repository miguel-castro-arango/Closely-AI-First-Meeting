<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--bg);color:var(--fg);font-family:var(--font-mono);padding:24px 28px;}
  .row{display:flex;gap:16px;align-items:flex-end;}
  .box{background:var(--bg-elev);border:1px solid var(--border-strong);width:74px;height:60px;}
  .name{font-size:10px;color:var(--fg-strong);margin-top:8px;}
  .v{font-size:9px;color:var(--muted);}
  .pill{width:96px;border-radius:9999px;height:34px;background:var(--bg-elev);border:1px solid var(--border-strong);}
</style>
</head>
<body>
  <div class="row">
    <div><div class="box" style="border-radius:4px;"></div><div class="name">sm</div><div class="v">4px</div></div>
    <div><div class="box" style="border-radius:8px;"></div><div class="name">md</div><div class="v">8px</div></div>
    <div><div class="box" style="border-radius:12px;"></div><div class="name">lg</div><div class="v">12px</div></div>
    <div><div class="box" style="border-radius:16px;"></div><div class="name">card</div><div class="v">16px</div></div>
    <div><div class="box" style="border-radius:18px;"></div><div class="name">chrome</div><div class="v">18px</div></div>
    <div><div class="pill"></div><div class="name">pill</div><div class="v">9999px</div></div>
  </div>
</body>
</html>
