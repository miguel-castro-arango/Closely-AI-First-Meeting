<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--bg);color:var(--fg);font-family:var(--font-sans);padding:26px 30px;}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap;}
  .badge{display:inline-flex;align-items:center;gap:6px;border-radius:9999px;padding:5px 11px;font-size:11px;font-weight:500;letter-spacing:.04em;text-transform:uppercase;}
  .dot{position:relative;width:6px;height:6px;}
  .dot i{position:absolute;inset:0;border-radius:50%;background:currentColor;}
  .dot i.ping{animation:ping 1.5s cubic-bezier(0,0,.2,1) infinite;opacity:.75;}
  @keyframes ping{75%,100%{transform:scale(2.2);opacity:0;}}
  .live{background:var(--success-soft);color:var(--success);border:1px solid var(--success-line);}
  .accent{background:var(--accent-soft);color:var(--accent);border:1px solid var(--accent-line);}
  .soon{background:var(--warn-soft);color:var(--warn);border:1px solid var(--warn-line);}
  .danger{background:var(--danger-soft);color:var(--danger);border:1px solid var(--danger-line);}
  .neutral{background:rgba(17,19,32,0.6);color:var(--muted);border:1px solid var(--border);}
  .tag{font-family:var(--font-mono);font-size:10px;color:var(--muted);margin-top:18px;text-transform:uppercase;letter-spacing:.12em;}
</style>
</head>
<body>
  <div class="row">
    <span class="badge live"><span class="dot"><i class="ping"></i><i></i></span>Live · 24/7</span>
    <span class="badge accent">Why Closely</span>
    <span class="badge soon">Coming soon</span>
    <span class="badge danger">Intrusion</span>
    <span class="badge neutral">Neutral</span>
  </div>
  <div class="tag">Pill · uppercase 11px · tint 10% + 30% border · optional pulsing ping dot</div>
</body>
</html>
