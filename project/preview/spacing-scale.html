<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--bg);color:var(--fg);font-family:var(--font-mono);padding:26px 28px;}
  .row{display:flex;gap:14px;align-items:flex-end;}
  .col{display:flex;flex-direction:column;align-items:center;gap:7px;}
  .bar{background:var(--accent);border-radius:2px;width:20px;}
  .v{font-size:9px;color:var(--muted);}
</style>
</head>
<body>
  <div class="row">
    <div class="col"><div class="bar" style="height:4px;"></div><div class="v">4</div></div>
    <div class="col"><div class="bar" style="height:8px;"></div><div class="v">8</div></div>
    <div class="col"><div class="bar" style="height:12px;"></div><div class="v">12</div></div>
    <div class="col"><div class="bar" style="height:16px;"></div><div class="v">16</div></div>
    <div class="col"><div class="bar" style="height:20px;"></div><div class="v">20</div></div>
    <div class="col"><div class="bar" style="height:24px;"></div><div class="v">24</div></div>
    <div class="col"><div class="bar" style="height:32px;"></div><div class="v">32</div></div>
    <div class="col"><div class="bar" style="height:40px;"></div><div class="v">40</div></div>
    <div class="col"><div class="bar" style="height:48px;"></div><div class="v">48</div></div>
    <div class="col"><div class="bar" style="height:64px;"></div><div class="v">64</div></div>
    <div class="col"><div class="bar" style="height:96px;"></div><div class="v">96</div></div>
  </div>
  <div class="v" style="margin-top:14px;">4-pt base · section padding 96px (py-24) · container max-width 1152px (6xl)</div>
</body>
</html>
