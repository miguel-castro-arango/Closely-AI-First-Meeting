<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--bg);color:var(--fg);font-family:var(--font-sans);padding:0;}
  .wrap{display:flex;height:150px;}
  .cell{flex:1;display:flex;align-items:center;justify-content:center;border-right:1px solid var(--border);}
  .cell:last-child{border-right:none;}
  .logo{font-family:var(--font-display);font-weight:400;text-transform:uppercase;font-size:24px;letter-spacing:-0.01em;display:inline-flex;gap:5px;align-items:baseline;}
  .ai{color:var(--accent);}
  .onlight{background:var(--fg-strong);}
  .onlight .logo{color:#0A0B14;}
  .onbrand{background:var(--brand-gradient);}
  .onbrand .logo,.onbrand .ai{color:#fff;}
</style>
</head>
<body>
  <div class="wrap">
    <div class="cell"><span class="logo" style="color:var(--fg-strong);">Closely<span class="ai">AI</span></span></div>
    <div class="cell onlight"><span class="logo">Closely<span class="ai">AI</span></span></div>
    <div class="cell onbrand"><span class="logo">Closely<span class="ai">AI</span></span></div>
  </div>
</body>
</html>
