<!-- @dsCard group="Colors" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--bg);color:var(--fg);font-family:var(--font-mono);padding:22px 26px;}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
  .sw{border-radius:10px;height:64px;border:1px solid var(--border);}
  .name{font-size:10.5px;color:var(--fg-strong);margin-top:7px;}
  .hex{font-size:9.5px;color:var(--muted);}
</style>
</head>
<body>
  <div class="grid">
    <div><div class="sw" style="background:#FFFFFF;"></div><div class="name">fg-strong</div><div class="hex">#FFFFFF</div></div>
    <div><div class="sw" style="background:#E6E8EF;"></div><div class="name">fg</div><div class="hex">#E6E8EF</div></div>
    <div><div class="sw" style="background:#B4B8C8;"></div><div class="name">muted-strong</div><div class="hex">#B4B8C8</div></div>
    <div><div class="sw" style="background:#8A8FA3;"></div><div class="name">muted</div><div class="hex">#8A8FA3</div></div>
  </div>
</body>
</html>
